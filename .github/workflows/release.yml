name: Build Desktop Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PyInstaller
        run: py -m pip install --upgrade pip pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build executable
        run: |
          py -m PyInstaller --noconfirm --onefile --windowed --name JustDoIt `
            --add-data "web;web" `
            --add-data "engine.exe;." `
            just_do_it.py

      - name: Create portable ZIP (always)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist\JustDoIt.exe release\JustDoIt.exe -Force
          Compress-Archive -Path release\* -DestinationPath JustDoIt-portable-${{ github.ref_name }}.zip -Force

      - name: Build installer
        continue-on-error: true
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler not found" }
          $version = "$env:GITHUB_REF_NAME"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          & $iscc "/DMyAppVersion=$version" "installer\JustDoIt.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          body: |
            ## Download the app

            Primary download: `JustDoIt-portable-${{ github.ref_name }}.zip`

            If available in this release, use `JustDoIt-Setup.exe` for installer flow.

            The source code archives are generated automatically by GitHub and are not the app download.
          fail_on_unmatched_files: false
          files: |
            JustDoIt-portable-${{ github.ref_name }}.zip
            installer/output/JustDoIt-Setup.exe
          generate_release_notes: true