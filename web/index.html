<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Minimalist reset */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: #fff; 
            color: #424242; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh; 
        }
        .container { 
            flex: 1; margin: 0 auto; padding: 2rem; 
            width: 100%; max-width: 900px; 
            display: flex; flex-direction: column; gap: 2rem; 
        }
        h1, h2, h3 { 
            margin: 0; font-weight: 500; 
            color: #333; 
        }
        h1 { 
            font-size: 1.5rem; 
            border-bottom: 1px solid #e0e0e0; 
            padding-bottom: 1rem; width: 100%; 
        }
        
        button { 
            background: #387ed1; color: #fff; 
            border: none; padding: 0.6rem 1.2rem; 
            border-radius: 3px;
            font-size: 0.9rem;
            font-weight: 500; cursor: pointer; transition: background 0.2s; 
        }
        button:hover { background: #2c68b0; }
        
        input { 
            border: 1px solid #e0e0e0; 
            padding: 0.75rem; width: 100%; margin-bottom: 1rem; 
            font-size: 1rem; border-radius: 3px; 
            color: #424242;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #387ed1; }

        /* Login */
        #login-container { 
            max-width: 400px; margin: 8rem auto; 
            padding: 3rem 2rem; width: 100%; text-align: center;
        }
        #login-container h1 { margin-bottom: 0.25rem; border-bottom: 0; padding-bottom: 0; font-size: 2rem; font-weight: 500; color: #424242; }
        .login-subtitle { color: #888; font-size: 1rem; margin-bottom: 2.5rem; margin-top: 0; }
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; }
        #login-container input { padding: 0.85rem; border: 1px solid #e0e0e0; margin-bottom: 0; }
        #login-error { color: #d32f2f; background: #ffebee; padding: 0.75rem; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; text-align: center; border-radius: 3px; }
        #status-msg { margin-bottom: 1rem; padding: 0.75rem; border: 1px solid #e0e0e0; background: #f9f9f9; text-align: center; font-size: 0.85rem; display: none; border-radius: 3px;}
        #error-msg { display: none; color: #d32f2f; background: #ffebee; border: 1px solid #ef9a9a; padding: 1rem; border-radius: 3px; margin-bottom: 1rem;}

        /* Stats & Cards */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stat-card { 
            border: 1px solid #e0e0e0; 
            padding: 1rem 1.5rem; display: flex; flex-direction: column; 
            align-items: flex-start; justify-content: center; 
            border-radius: 4px;
            background: #fff;
            transition: background 0.2s;
        }
        .stat-card:hover { background: #f9f9f9; }
        .stat-title { font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.8rem; font-weight: 500; color: #333; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 1rem; border-bottom: 1px solid #e0e0e0; }
        th { font-weight: 500; color: #777; font-size: 0.85rem; text-transform: uppercase; background: #fafafa; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }
        tr { transition: background 0.1s; }
        
        .badge { font-size: 0.75rem; padding: 0.2rem 0.6rem; font-weight: 500; border-radius: 3px; }
        .yes { background: #f0f0f0; color: #424242; border: 1px solid #e0e0e0; }
        .no { background: transparent; color: #999; border: 1px solid #eee; }
        
        /* Heatmap */
        .heatmap-wrapper { border: 1px solid #e0e0e0; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-x: auto; border-radius: 4px; }
        .heatmap-grid { display: grid; grid-template-rows: repeat(7, 1fr); gap: 3px; grid-auto-flow: column; grid-auto-columns: 14px; padding-bottom: 0.5rem; }
        .heatmap-cell { width: 14px; height: 14px; border-radius: 2px; background: #eee; cursor: pointer; transition: 0.1s all; border: 1px solid transparent; }
        .heatmap-cell:hover { border-color: #999; }
        .heatmap-cell.selected { border: 1px solid #333; transform: scale(1.1); box-shadow: 0 0 2px rgba(0,0,0,0.2); }
        .heatmap-legend { display: flex; flex-direction: row; align-items: center; gap: 4px; font-size: 0.75rem; color: #777; }
        
        /* Modifiers - Zerodha Blue Palette */
        .color-0 { background: #f0f0f0; }
        .color-1 { background: #dce7f5; }
        .color-2 { background: #b8d0ed; }
        .color-3 { background: #6da2e0; }
        .color-4 { background: #387ed1; }
        .color-5 { background: #2665b0; } 
        
        /* Extras */
        .header-actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem; }
        .header-actions h1 { border-bottom: 0; padding-bottom: 0; width: auto; color: #333; }
        #filter-info { display: flex; justify-content: space-between; align-items: center; background: #f5f8fc; color: #387ed1; padding: 0.75rem 1rem; border: 1px solid #dce7f5; font-size: 0.9rem; margin-bottom: -1rem; display: none; border-radius: 3px; }
        #clear-filter { font-size: 1rem; cursor: pointer; color: #387ed1; padding: 0 0.5rem; font-weight: 600; }
        #clear-filter:hover { color: #2665b0; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 2rem; left: 2rem; font-size: 1.2rem; font-weight: 600; color: #424242; letter-spacing: -0.5px;">Just Do it</div>
    
    <div id="login-container">
        <h1 style="font-size: 1.4rem; margin-bottom: 0.5rem; font-weight: 500;">Login</h1>
        <p class="login-subtitle" style="margin-bottom: 2rem;">Track your focus dashboard</p>
        <div id="login-error"></div>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="">
            </div>
            <button type="submit" style="width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 1rem; font-weight: 500;">Login</button>
        </form>

        <div id="site-footer" style="margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; display: flex; flex-direction: column; gap: 0.6rem;">
            <div>Open source on <a href="https://github.com/letsjoyn/just-do-it" style="color: #387ed1; text-decoration: none;" target="_blank">GitHub</a></div>
            <div style="display: flex; justify-content: center; gap: 0.8rem;">
                <a href="#" style="color: #387ed1; text-decoration: none;">Privacy Policy</a>
                <span style="color: #e0e0e0;">|</span>
                <a href="#" style="color: #387ed1; text-decoration: none;">Terms</a>
            </div>
        </div>
    </div>

    <div id="dashboard-container" class="container" style="display: none;">
        <div class="header-actions">
            <h1>Just Do it <span style="color: #888; font-weight: 400; font-size: 1.2rem;">/ Dashboard</span></h1>
            <button id="logout-btn">Log Out</button>
        </div>
        
        <div id="status-msg"></div>
        <div id="error-msg"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Sessions</div>
                <div class="stat-value" id="total-sessions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Focus Time</div>
                <div class="stat-value" id="total-duration">0s</div>
            </div>
        </div>

        <div class="heatmap-wrapper" id="heatmap-wrapper" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.5rem;">
                <h3 style="font-size: 0.9rem; color: #555; font-weight: 500;">Activity Heatmap</h3>
                <div class="heatmap-legend">
                    Less <div class="heatmap-cell color-1"></div><div class="heatmap-cell color-2"></div><div class="heatmap-cell color-3"></div><div class="heatmap-cell color-4"></div><div class="heatmap-cell color-5"></div> More
                </div>
            </div>
            <div class="heatmap-container" style="display: flex; flex-direction: column;">
                <div class="months-label" id="months-label" style="display: flex; position: relative; height: 1.2rem; margin-left: 24px; font-size: 0.75rem; color: #777;"></div>
                <div class="days-and-grid" style="display: flex; flex-direction: row; gap: 0.5rem; align-items: stretch;">
                    <div class="days-label" style="display: grid; grid-template-rows: repeat(7, 1fr); gap: 3px; font-size: 0.7rem; color: #777; padding-bottom: 0.5rem; align-items: center; justify-items: end;">
                        <span style="grid-row: 2;">Mon</span>
                        <span style="grid-row: 4;">Wed</span>
                        <span style="grid-row: 6;">Fri</span>
                    </div>
                    <div class="heatmap-grid" id="heatmap"></div>
                </div>
            </div>
        </div>

        <div id="filter-info">
            <span id="filter-text" style="font-weight: 500;"></span>
            <span id="clear-filter" title="Clear Filter">&#10005;</span>
        </div>

        <div style="border: 1px solid #e0e0e0; border-radius: 4px; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Duration</th>
                        <th>Unlock Method</th>
                        <th>Early Term</th>
                    </tr>
                </thead>
                <tbody id="session-table-body">
                    <tr><td colspan="4" style="text-align:center; color:#999; font-style: italic;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Shia Meme -->
    <img src="output-onlinepngtools.png" id="shia-meme" alt="Just Do It" style="position: fixed; left: -30px; bottom: -80px; height: 450px; z-index: 5; pointer-events: none; transition: transform 0.3s ease;">

    <script type="module" src="dashboard.js"></script>
</body>
</html>
